<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Face recognition attendance tracking for university classrooms." />
    <meta name="theme-color" content="#C8A84B" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Google Fonts: DM Mono (body) + Syne (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!--
      Load face-api from CDN as an ES module, then assign to window.faceapi
      so TypeScript files can reference it via `declare const faceapi`.
      The service worker caches the model files after first load.
    -->
    <!-- Early headless detection and optional stub for face-api.
         This runs before src/main.ts so headless test runners (Playwright) are detected
         and the heavy CDN module is not imported at runtime. Avoids wasm/webgl failures in CI.
    -->
    <script>
      (function() {
        try {
          var ua = (navigator.userAgent || '').toLowerCase();
          var isHeadless = ua.indexOf('headless') !== -1 || ua.indexOf('playwright') !== -1;
          if (isHeadless) {
            // Signal to the app to skip loading the CDN module
            window.__FORCE_SKIP_FACEAPI = true;
            // Minimal runtime stub so app code can call loadFromUri/detectAllFaces without errors.
            window.faceapi = {
              nets: {
                ssdMobilenetv1: { loadFromUri: async function() {} },
                faceLandmark68Net: { loadFromUri: async function() {} },
                faceRecognitionNet: { loadFromUri: async function() {} },
              },
              detectAllFaces: async function() { return []; },
              tf: {
                setBackend: async function() { return null; },
                getBackend: function() { return 'cpu'; },
              },
            };
          }
        } catch (e) {
          // Ignore — best-effort only
          console.warn('Headless detection failed:', e);
        }
      })();
    </script>

    <!-- QRCode.js for class enrollment QR codes -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>

    <title>Changttendance</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app"></div>
    <!-- ARIA live regions for recognition events and errors -->
    <div id="recognition-announcements" aria-live="polite"   aria-atomic="true" class="sr-only"></div>
    <div id="error-announcements"       aria-live="assertive" aria-atomic="true" class="sr-only"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
