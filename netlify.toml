[build]
  command = "npm run build"
  publish = "dist"

# Security + SharedArrayBuffer headers (required for TensorFlow.js WebGL/WASM)
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy    = "same-origin"
    Cross-Origin-Embedder-Policy  = "require-corp"
    Permissions-Policy            = "camera=*"
    X-Frame-Options               = "DENY"
    X-Content-Type-Options        = "nosniff"
    Referrer-Policy               = "strict-origin-when-cross-origin"
    Content-Security-Policy       = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; worker-src 'self';"

# Serve model files with long-lived cache (cache version in SW handles invalidation)
[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
